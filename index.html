<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oracle</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-subtle: #fafafa;
    --bg-mute: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --text: #18181b;
    --text-2: #52525b;
    --text-3: #71717a;
    --accent: #18181b;
    --link: #2563eb;
    --strong: #15803d;
    --moderate: #a16207;
    --stretch: #b91c1c;
    --user-bubble: #18181b;
    --assistant-bubble: #f4f4f5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 14px 24px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar .crumb { color: var(--text-3); font-size: 13px; }
  .topbar .spacer { flex: 1; }
  .topbar .meta { color: var(--text-3); font-size: 12.5px; }
  .topbar .reset {
    border: 1px solid var(--border); background: white; color: var(--text-2);
    padding: 4px 10px; font: inherit; font-size: 12px; border-radius: 5px; cursor: pointer;
  }
  .topbar .reset:hover { color: var(--text); border-color: var(--border-strong); }

  /* Chat */
  .chat-wrap { flex: 1; display: flex; justify-content: center; overflow: hidden; }
  .chat { width: 100%; max-width: 720px; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 88%; line-height: 1.55; }
  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg .body {
    padding: 10px 14px; border-radius: 14px; font-size: 14px;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.assistant .body { background: var(--assistant-bubble); color: var(--text); border-top-left-radius: 4px; }
  .msg.user .body { background: var(--user-bubble); color: white; border-top-right-radius: 4px; }
  .msg.assistant .meta { font-size: 10.5px; color: var(--text-3); margin-bottom: 4px; padding: 0 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .msg.user .meta { display: none; }
  .msg-img { margin-top: 6px; }
  .msg-img img { max-width: 240px; max-height: 240px; border-radius: 10px; display: block; border: 1px solid var(--border); }

  .typing {
    align-self: flex-start; padding: 12px 14px; background: var(--assistant-bubble); border-radius: 14px; border-top-left-radius: 4px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-3);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Composer */
  .composer { padding: 14px 20px 20px; border-top: 1px solid var(--border); background: white; flex-shrink: 0; }
  .composer-inner { display: flex; gap: 8px; align-items: flex-end; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 12px; padding: 8px; }
  .composer-inner:focus-within { border-color: var(--text); }
  .composer textarea {
    flex: 1; background: transparent; border: none; outline: none;
    font: inherit; font-size: 14px; resize: none; padding: 6px 8px;
    min-height: 22px; max-height: 160px; line-height: 1.5;
  }
  .composer .photo-btn, .composer .send-btn {
    width: 34px; height: 34px; border-radius: 8px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .composer .photo-btn { background: white; border: 1px solid var(--border); color: var(--text-2); }
  .composer .photo-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .composer .send-btn { background: var(--accent); color: white; }
  .composer .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .composer .send-btn:hover:not(:disabled) { opacity: 0.85; }
  .composer .attachments { display: flex; gap: 6px; padding: 0 4px 6px; flex-wrap: wrap; }
  .composer .attachment {
    position: relative; width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border);
  }
  .composer .attachment img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .composer .attachment .remove {
    position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white;
    width: 16px; height: 16px; border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 1; padding: 0; border: none;
    display: flex; align-items: center; justify-content: center;
  }
  .composer .hint { font-size: 11px; color: var(--text-3); margin-top: 6px; text-align: center; }

  /* Ring card (inline in chat) */
  .ring-card {
    border: 1px solid var(--border); border-radius: 10px; background: white; margin-top: 8px; overflow: hidden;
    animation: ringIn 0.35s ease-out;
  }
  @keyframes ringIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .ring-card-head {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  .ring-card-title { margin: 0; font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
  .ring-card-meta { color: var(--text-3); font-size: 11.5px; }
  .ring-card-spacer { flex: 1; }
  .quality-badge { font-size: 10.5px; padding: 2px 7px; border-radius: 4px; font-weight: 500; background: var(--bg-mute); color: var(--text-2); border: 1px solid var(--border); }
  .quality-badge.strong { background: #f0fdf4; color: var(--strong); border-color: #bbf7d0; }
  .quality-badge.moderate { background: #fffbeb; color: var(--moderate); border-color: #fde68a; }
  .quality-badge.stretch { background: #fef2f2; color: var(--stretch); border-color: #fecaca; }
  .ring-card-summary { padding: 10px 14px; background: var(--bg-subtle); border-bottom: 1px solid var(--border); font-size: 12.5px; color: var(--text-2); line-height: 1.55; }
  .ring-card-steps {}
  .ring-card-step {
    padding: 10px 14px; display: grid; grid-template-columns: 56px 1fr;
    gap: 12px; border-bottom: 1px solid var(--border); align-items: start;
  }
  .ring-card-step:last-child { border-bottom: none; }
  .ring-card-step.is-you { background: #fefce8; }
  .ring-card-step .thumb {
    width: 56px; height: 56px; border-radius: 6px; overflow: hidden;
    background: var(--bg-mute); display: flex; align-items: center; justify-content: center;
  }
  .ring-card-step .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ring-card-step .thumb .no-img { font-size: 9px; color: var(--text-3); }
  .ring-card-step .who { font-size: 13px; font-weight: 600; }
  .ring-card-step .who .you-tag { display: inline-block; margin-left: 4px; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--accent); color: white; font-weight: 500; vertical-align: 1px; }
  .ring-card-step .flow {
    font-size: 12px; color: var(--text-2); line-height: 1.5; margin-top: 2px;
  }
  .ring-card-step .flow .give { color: var(--text); font-weight: 500; }
  .ring-card-step .flow .arrow { color: var(--text-3); margin: 0 4px; }
  .ring-card-step .reasoning {
    font-size: 11.5px; color: var(--text-3); margin-top: 3px; font-style: italic;
  }

  /* Footer status */
  .status-line {
    font-size: 11px; color: var(--text-3); padding: 6px 14px; background: var(--bg-mute);
    display: flex; align-items: center; gap: 6px;
  }
  .spinner { width: 10px; height: 10px; border: 1.5px solid var(--border-strong); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <h1>Oracle</h1>
  <span class="crumb" id="crumb">/ barter chat</span>
  <div class="spacer"></div>
  <span class="meta" id="dataset-meta"></span>
  <button class="reset" id="reset-btn">new chat</button>
</div>

<div class="chat-wrap">
  <div class="chat">
    <div class="messages" id="messages"></div>
    <div class="composer">
      <div class="attachments" id="attachments"></div>
      <div class="composer-inner">
        <button class="photo-btn" id="photo-btn" title="Attach photo">📷</button>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
        <textarea id="composer" placeholder="Tell the Oracle what you'd trade…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled>→</button>
      </div>
      <div class="hint">The Oracle asks short questions to understand the trade, then surfaces a ring across <span id="pool-count">…</span> real Craigslist listings.</div>
    </div>
  </div>
</div>

<script>
const GEMINI_KEY = "AIzaSyCGt3ZXPHBY73w3wjUz284Ai3h6uqwFXdw";
const MODEL = "gemini-3.5-flash";
const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_KEY}`;
const STREAM_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:streamGenerateContent?alt=sse&key=${GEMINI_KEY}`;

const escapeHtml = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let LISTINGS = [];
let LISTINGS_BY_ID = {};
let HISTORY = [];           // contents array for Gemini
let USER_OFFERING = null;   // {title, category, condition, story, image_b64, image_mime, image_dataurl}
let USER_WANTS = [];        // string[]
let ATTACHMENTS = [];       // [{b64, mime, dataUrl}]
let TURNS_SINCE_SEARCH = 0;
let SPEC_PROMISE = null;       // pending speculative search
let SPEC_KEY = null;           // fingerprint of speculative args
let SPEC_ABORT = null;         // AbortController for in-flight speculation

// ---- Boot ----
(async () => {
  LISTINGS = await (await fetch('seed.json')).json();
  LISTINGS_BY_ID = Object.fromEntries(LISTINGS.map(l => [l.id, l]));
  document.getElementById('dataset-meta').textContent = `${LISTINGS.length} listings · Craigslist SF Bay /bar`;
  document.getElementById('pool-count').textContent = LISTINGS.length;
  startConversation();
})();

const SYSTEM_PROMPT = `You are the Oracle of a barter marketplace. You help a user find a trade — not by showing them a catalog, but by asking a few sharp questions to understand what they have, what they want, and what would actually make a good deal for them.

CONVERSATION STYLE:
- Short. 1-2 sentences per turn. Casual but precise.
- Ask ONE specific question at a time. Don't be a form.
- Use the user's own words back to them.
- If they upload a photo, identify the item and confirm with them ("Looks like a Seiko diver — is that right?").
- Don't be a sycophant. Don't say "Great question!" or "Awesome!"

YOUR GOAL: Collect enough info to call the search_matches tool. You need:
- offering: title, category, condition, 1-2 sentence story
- wants: at least 2-3 specific things they'd accept in return (NOT "open to offers" — push them on specifics)

WHEN TO ASK A FOLLOW-UP:
- If a want is too vague ("a bike" → "road or mountain? brand preferences?")
- If condition is unclear ("Got it. Any scratches or quirks worth flagging?")
- If they list nothing specific they want ("What's the thing you'd actually use right now?")

WHEN TO CALL search_matches:
- As soon as you have specific offering + 2-3 specific wants, call the tool. Don't keep asking forever.
- If first search returns no rings, ask a widening question ("Would you also take a [related thing]?") and search again.

AFTER MATCHES ARRIVE:
- The tool returns rings. Describe the BEST ring to the user in plain prose, naming each person and what they trade. Keep it to 3-4 sentences.
- Mention what THEY end up with and that the ring closes.
- If the best ring is a stretch, say so honestly.`;

const SEARCH_TOOL = {
  name: "search_matches",
  description: "Search 222 Craigslist barter listings for trade rings that include the user's offering. Call this once you have specific offer + specific wants.",
  parameters: {
    type: "object",
    properties: {
      offering_title: { type: "string", description: "Short product name." },
      offering_category: { type: "string" },
      offering_condition: { type: "string" },
      offering_story: { type: "string", description: "1-2 sentence first-person description." },
      wants: {
        type: "array",
        items: { type: "string" },
        description: "Specific items the user would accept (named brands/models if known). Avoid 'open to offers'."
      },
      max_ring_length: { type: "integer", description: "2-5. Use 3 by default." }
    },
    required: ["offering_title", "offering_category", "offering_condition", "offering_story", "wants"]
  }
};

const RINGS_SCHEMA = {
  type: "object",
  properties: {
    rings: {
      type: "array",
      items: {
        type: "object",
        properties: {
          title: { type: "string" },
          summary: { type: "string" },
          quality: { type: "string" },
          members: {
            type: "array",
            items: {
              type: "object",
              properties: {
                listing_id: { type: "string" },
                satisfies_my_want: { type: "string" },
                why_fits: { type: "string" },
                edge_quality: { type: "string" }
              },
              required: ["listing_id", "satisfies_my_want", "why_fits", "edge_quality"]
            }
          }
        },
        required: ["title", "summary", "quality", "members"]
      }
    }
  },
  required: ["rings"]
};

function compactListing(l) {
  return {
    id: l.id, user: l.user, loc: l.location,
    has: `${l.has.title} (${l.has.category}, ${l.has.condition}) — ${l.has.story}`,
    wants: l.wants.map(w => `${w.thing}${w.why ? ` — ${w.why}` : ''}${w.specific === false ? ' [catch-all]' : ''}`)
  };
}

function argKey(args) {
  return ((args.offering_title || '') + '|' + (args.wants || []).join(',')).toLowerCase().replace(/\s+/g,' ').trim();
}

async function runMatcher(args, signal) {
  // The slow part. Streams. Returns {rings:[...]}
  USER_OFFERING = {
    title: args.offering_title,
    category: args.offering_category || '',
    condition: args.offering_condition || 'unspecified',
    story: args.offering_story || '',
  };
  USER_WANTS = args.wants || [];
  const maxLen = args.max_ring_length || 3;

  const userListing = {
    id: 'you', user: 'You', location: 'Bay Area', url: null,
    images: ATTACHMENTS.map(a => a.dataUrl).filter(Boolean),
    has: USER_OFFERING,
    wants: USER_WANTS.map(thing => ({ thing, why: '', specific: true })),
    specific: true,
  };
  LISTINGS_BY_ID['you'] = userListing;

  const pool = LISTINGS.map(compactListing);
  const compact = [compactListing(userListing), ...pool];

  const prompt = `Find the BEST 3 trade rings of length 2 to ${maxLen} that INCLUDE listing "you" (the first listing).

A ring is a directed cycle: Member 1 receives from Member N, Member 2 from Member 1, etc. Everyone gets something they specifically wanted.

HARD RULES:
- EVERY ring must include listing_id "you".
- No member appears twice.
- At MOST one catch-all edge per ring; zero preferred.
- satisfies_my_want must quote VERBATIM from a real want on that listing.

QUALITY:
- strong: offer exactly matches a named want.
- moderate: same category, reasonable substitute.
- stretch: category match with creative interpretation.
- ring.quality = strong if all strong; moderate if any moderate; stretch if any stretch.

Order rings strongest first. Prefer rings where "you" ends up with something matching their FIRST want.

LISTINGS (${compact.length}, "you" is first):
${JSON.stringify(compact)}`;

  const r = await fetch(STREAM_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    signal,
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        responseMimeType: "application/json",
        responseSchema: RINGS_SCHEMA,
        thinkingConfig: { thinkingBudget: 2000 }  // tight
      }
    })
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${(await r.text()).slice(0,300)}`);
  const reader = r.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', accText = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf('\n')) >= 0) {
      const line = buf.slice(0, nl);
      buf = buf.slice(nl + 1);
      if (!line.startsWith('data:')) continue;
      const payload = line.slice(5).trim();
      if (!payload) continue;
      try {
        const chunk = JSON.parse(payload);
        const t = chunk.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (t) accText += t;
      } catch(_) {}
    }
  }
  try { return JSON.parse(accText); }
  catch(_) {
    // Salvage rings even from partial output
    const rings = extractCompletedRings(accText);
    return { rings };
  }
}

function extractCompletedRings(text) {
  const arrKey = text.indexOf('"rings"');
  if (arrKey < 0) return [];
  const arrOpen = text.indexOf('[', arrKey);
  if (arrOpen < 0) return [];
  const rings = [];
  let depth = 0, inStr = false, esc = false, objStart = -1;
  for (let i = arrOpen + 1; i < text.length; i++) {
    const c = text[i];
    if (esc) { esc = false; continue; }
    if (inStr) {
      if (c === '\\') esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === '{') { if (depth === 0) objStart = i; depth++; }
    else if (c === '}') {
      depth--;
      if (depth === 0 && objStart >= 0) {
        try { rings.push(JSON.parse(text.slice(objStart, i + 1))); } catch(_) {}
        objStart = -1;
      }
    } else if (c === ']' && depth === 0) break;
  }
  return rings;
}

async function searchMatches(args) {
  const key = argKey(args);
  // If a speculative search is in flight or completed with matching key, reuse it
  if (SPEC_PROMISE && SPEC_KEY === key) {
    try {
      const result = await SPEC_PROMISE;
      if (result) return result;
    } catch(_) {}
  }
  // Otherwise run fresh (and cancel any wrong-key speculation)
  if (SPEC_ABORT) { try { SPEC_ABORT.abort(); } catch(_) {} }
  SPEC_PROMISE = null; SPEC_KEY = null; SPEC_ABORT = null;

  const ac = new AbortController();
  return await runMatcher(args, ac.signal);
}

// ---- Speculative search ----
// After each user message, predict the likely offering+wants from chat history
// and pre-fire the matcher. If the Oracle's actual tool call matches the prediction,
// we return the cached result immediately.
async function predictSpec() {
  // Need at least one user message with text or image
  const hasUserContent = HISTORY.some(m => m.role === 'user' && m.parts?.length);
  if (!hasUserContent) return null;

  const convo = HISTORY.map(m => {
    const role = m.role === 'model' ? 'oracle' : m.role;
    const text = (m.parts || []).filter(p => p.text).map(p => p.text).join(' ');
    const hasImg = (m.parts || []).some(p => p.inline_data);
    return `${role}: ${text}${hasImg ? ' [photo attached]' : ''}`;
  }).join('\n');

  // Include the most recent image so vision can identify it for category guesses
  const visionParts = [];
  for (const m of HISTORY) {
    for (const p of (m.parts || [])) {
      if (p.inline_data) visionParts.push(p);
    }
  }

  const prompt = `Predict what the user is most likely to ASK to trade. Based on the conversation, fill in your best guess. Set ready=true ONLY if you have a specific item AND at least 1 specific want.

CONVERSATION:
${convo}

Return JSON: {ready: bool, offering_title, offering_category, offering_condition, offering_story, wants: [string]}`;

  const parts = [...visionParts.slice(-1), { text: prompt }];

  try {
    const r = await fetch(MODEL_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: {
          responseMimeType: 'application/json',
          thinkingConfig: { thinkingBudget: 0 },
          responseSchema: {
            type: 'object',
            properties: {
              ready: { type: 'boolean' },
              offering_title: { type: 'string' },
              offering_category: { type: 'string' },
              offering_condition: { type: 'string' },
              offering_story: { type: 'string' },
              wants: { type: 'array', items: { type: 'string' } }
            },
            required: ['ready']
          }
        }
      })
    });
    const j = await r.json();
    if (j.error) return null;
    const guess = JSON.parse(j.candidates[0].content.parts[0].text);
    if (!guess.ready || !guess.wants?.length) return null;
    return guess;
  } catch(_) { return null; }
}

async function kickSpeculative() {
  // Cancel any prior speculation
  if (SPEC_ABORT) { try { SPEC_ABORT.abort(); } catch(_) {} }
  SPEC_PROMISE = null; SPEC_KEY = null; SPEC_ABORT = null;

  const guess = await predictSpec();
  if (!guess) return;
  guess.max_ring_length = 3;
  const key = argKey(guess);
  const ac = new AbortController();
  SPEC_KEY = key;
  SPEC_ABORT = ac;
  SPEC_PROMISE = runMatcher(guess, ac.signal).catch(_ => null);
  console.log('[speculate] firing for key:', key);
}

// ---- Chat plumbing ----
function appendMessage(role, content, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  if (role === 'assistant') {
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = 'Oracle';
    wrap.appendChild(meta);
  }
  const body = document.createElement('div');
  body.className = 'body';
  body.textContent = content;
  wrap.appendChild(body);

  if (opts.images && opts.images.length) {
    for (const url of opts.images) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'msg-img';
      imgWrap.innerHTML = `<img src="${url}">`;
      wrap.appendChild(imgWrap);
    }
  }
  if (opts.ringCards && opts.ringCards.length) {
    for (const ringHtml of opts.ringCards) {
      const ringWrap = document.createElement('div');
      ringWrap.innerHTML = ringHtml;
      wrap.appendChild(ringWrap.firstElementChild);
    }
  }

  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
}

function showTyping() {
  hideTyping();
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}
function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function renderRingCard(ring) {
  const len = ring.members.length;
  const stepsHtml = ring.members.map((m, k) => {
    const l = LISTINGS_BY_ID[m.listing_id];
    if (!l) return '';
    const isYou = m.listing_id === 'you';
    const prev = ring.members[(k - 1 + len) % len];
    const prevL = LISTINGS_BY_ID[prev.listing_id];
    const thumb = (l.images && l.images[0])
      ? `<div class="thumb"><img src="${escapeHtml(l.images[0])}" loading="lazy"></div>`
      : `<div class="thumb"><span class="no-img">no img</span></div>`;
    return `
      <div class="ring-card-step ${isYou ? 'is-you' : ''}">
        ${thumb}
        <div>
          <div class="who">${escapeHtml(l.user)}${isYou ? '<span class="you-tag">you</span>' : ''}</div>
          <div class="flow">
            <span class="give">${escapeHtml(l.has.title)}</span>
            <span class="arrow">→</span>
            satisfies <em>"${escapeHtml(m.satisfies_my_want)}"</em>
            <span class="quality-badge ${m.edge_quality}" style="margin-left:6px;">${escapeHtml(m.edge_quality)}</span>
          </div>
          <div class="reasoning">${escapeHtml(m.why_fits)}</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="ring-card">
      <div class="ring-card-head">
        <span class="ring-card-title">${escapeHtml(ring.title)}</span>
        <span class="ring-card-meta">${len}-way</span>
        <span class="ring-card-spacer"></span>
        <span class="quality-badge ${ring.quality}">${escapeHtml(ring.quality)}</span>
      </div>
      <div class="ring-card-summary">${escapeHtml(ring.summary)}</div>
      <div class="ring-card-steps">${stepsHtml}</div>
    </div>
  `;
}

// ---- Gemini turn ----
async function sendTurn(userText, images) {
  // Build user message parts
  const userParts = [];
  if (images && images.length) {
    for (const a of images) userParts.push({ inline_data: { mime_type: a.mime, data: a.b64 } });
  }
  if (userText) userParts.push({ text: userText });
  if (userParts.length === 0) return;

  HISTORY.push({ role: 'user', parts: userParts });
  appendMessage('user', userText, { images: images ? images.map(a => a.dataUrl) : [] });

  // Fire speculative search in parallel — by the time the Oracle decides to call the tool, it may be done
  kickSpeculative();

  await runAssistantLoop();
}

async function runAssistantLoop() {
  showTyping();
  let safety = 0;
  while (safety++ < 4) {
    const body = {
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: HISTORY,
      tools: [{ function_declarations: [SEARCH_TOOL] }],
      tool_config: { function_calling_config: { mode: "AUTO" } }
    };
    let j;
    try {
      const r = await fetch(MODEL_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      j = await r.json();
      if (j.error) throw new Error(j.error.message);
    } catch(e) {
      hideTyping();
      appendMessage('assistant', `Error: ${e.message}`);
      return;
    }

    const candidate = j.candidates && j.candidates[0];
    if (!candidate) { hideTyping(); appendMessage('assistant', 'No response.'); return; }
    const parts = candidate.content?.parts || [];
    const funcCalls = parts.filter(p => p.functionCall);
    const textParts = parts.filter(p => p.text).map(p => p.text);

    if (funcCalls.length) {
      // Execute the search tool
      const modelMsg = { role: 'model', parts };
      HISTORY.push(modelMsg);

      const responses = [];
      for (const fc of funcCalls) {
        if (fc.functionCall.name === 'search_matches') {
          // Show searching status as a brief assistant note
          hideTyping();
          // Render a status line as part of the previous assistant context
          // We'll keep the typing indicator going instead
          showTyping();
          try {
            const result = await searchMatches(fc.functionCall.args);
            responses.push({
              role: 'function',
              parts: [{ functionResponse: { name: 'search_matches', response: { rings: result.rings || [] } } }]
            });
          } catch(e) {
            responses.push({
              role: 'function',
              parts: [{ functionResponse: { name: 'search_matches', response: { error: e.message } } }]
            });
          }
        }
      }
      HISTORY.push(...responses);
      // Loop again to get the assistant's text response after the tool call
      continue;
    }

    // Final text response
    hideTyping();
    if (textParts.length) {
      const text = textParts.join('\n').trim();
      // Render with possibly inline ring cards from the most recent searchMatches call
      const lastFn = [...HISTORY].reverse().find(m => m.role === 'function' && m.parts?.[0]?.functionResponse?.name === 'search_matches');
      let ringHtmls = [];
      if (lastFn && !lastFn._rendered) {
        const rings = lastFn.parts[0].functionResponse.response.rings || [];
        ringHtmls = rings.slice(0, 1).map(renderRingCard); // show top ring inline
        lastFn._rendered = true;
      }
      HISTORY.push({ role: 'model', parts: [{ text }] });
      appendMessage('assistant', text, { ringCards: ringHtmls });
    }
    return;
  }
  hideTyping();
}

// ---- Conversation start ----
function startConversation() {
  HISTORY = [];
  USER_OFFERING = null;
  USER_WANTS = [];
  ATTACHMENTS = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('attachments').innerHTML = '';
  // Seed the conversation with the assistant's opener (in HISTORY so the model knows what it said)
  const opener = "What do you have to trade? You can describe it or send a photo.";
  HISTORY.push({ role: 'model', parts: [{ text: opener }] });
  appendMessage('assistant', opener);
}

// ---- Composer ----
const composer = document.getElementById('composer');
const sendBtn = document.getElementById('send-btn');
const fileInput = document.getElementById('file-input');
const cameraInput = document.getElementById('camera-input');
const photoBtn = document.getElementById('photo-btn');

composer.addEventListener('input', () => {
  composer.style.height = 'auto';
  composer.style.height = Math.min(composer.scrollHeight, 160) + 'px';
  updateSendState();
});
composer.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;

photoBtn.onclick = () => {
  // Mobile: prefer camera. Desktop: open file picker. We'll show both via long-press? Just open file picker for simplicity.
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  (isMobile ? cameraInput : fileInput).click();
};
photoBtn.oncontextmenu = e => { e.preventDefault(); fileInput.click(); };

fileInput.onchange = e => { for (const f of e.target.files) addAttachment(f); fileInput.value = ''; };
cameraInput.onchange = e => { for (const f of e.target.files) addAttachment(f); cameraInput.value = ''; };

function addAttachment(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    const att = { b64: dataUrl.split(',')[1], mime: file.type, dataUrl };
    ATTACHMENTS.push(att);
    renderAttachments();
    updateSendState();
  };
  reader.readAsDataURL(file);
}

function renderAttachments() {
  const wrap = document.getElementById('attachments');
  wrap.innerHTML = ATTACHMENTS.map((a, i) =>
    `<div class="attachment"><img src="${a.dataUrl}"><button class="remove" data-i="${i}">×</button></div>`
  ).join('');
  wrap.querySelectorAll('.remove').forEach(b => b.onclick = () => { ATTACHMENTS.splice(parseInt(b.dataset.i), 1); renderAttachments(); updateSendState(); });
}

function updateSendState() {
  sendBtn.disabled = !composer.value.trim() && ATTACHMENTS.length === 0;
}

async function send() {
  const text = composer.value.trim();
  const imgs = ATTACHMENTS.slice();
  if (!text && imgs.length === 0) return;
  composer.value = '';
  composer.style.height = 'auto';
  ATTACHMENTS = [];
  renderAttachments();
  updateSendState();
  await sendTurn(text, imgs);
}

document.getElementById('reset-btn').onclick = startConversation;
</script>
